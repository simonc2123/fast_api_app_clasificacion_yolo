services:
  yolo-backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: simon2123/yolo-backend:latest
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  yolo-frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: simon2123/yolo-frontend:latest
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://yolo-backend:8000/api/v1/detect
    depends_on:
      yolo-backend:
        condition: service_healthy
